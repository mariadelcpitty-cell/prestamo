<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Préstamos</title>

    <!-- ENLACE AL MANIFEST Y CONFIGURACIÓN PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f2937">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Préstamos">

    <!-- Carga de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Carga de HTML2Canvas (para tomar la "foto" y compartir) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Estilo para que la app se sienta más "nativa" */
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-family: 'Inter', sans-serif; /* Usando una fuente más moderna si está disponible */
        }
        /* Clases para ocultar/mostrar vistas */
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        /* Estilo para ocultar el scrollbar pero permitir el scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        /* Estilos para el overlay de carga y modales */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: none; /* Oculto por defecto */
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-content {
            background-color: #1f2937; /* bg-gray-800 */
            color: white;
            padding: 1.5rem; /* p-6 */
            border-radius: 0.5rem; /* rounded-lg */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <!-- Input oculto para restaurar backup -->
    <input type="file" id="restore-input" class="hidden" accept=".json">

    <!-- Contenedor principal -->
    <div class="container mx-auto max-w-lg p-4 min-h-screen">

        <!-- ===== VISTA 1: LISTA DE CLIENTES ===== -->
        <div id="page-list" class="page active space-y-4">
            <h1 class="text-3xl font-bold text-center text-blue-400 mb-6">Control de Préstamos</h1>
            
            <button id="btn-show-form" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition duration-300">
                + Agregar Nuevo Cliente
            </button>

            <h2 class="text-2xl font-semibold border-b border-gray-700 pb-2">Mis Clientes</h2>
            <div id="client-list-container" class="space-y-3">
                <!-- Los clientes se cargarán aquí dinámicamente -->
                <p class="text-gray-400">No hay clientes registrados.</p>
            </div>

            <!-- Sección de Administración -->
            <div class="mt-8 pt-4 border-t border-gray-700 space-y-3">
                <h2 class="text-2xl font-semibold text-center">Administración</h2>
                
                <button id="btn-show-report" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition duration-300">
                    Ver Reporte General
                </button>

                <div class="grid grid-cols-2 gap-3">
                    <button id="btn-backup" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition duration-300">
                        Descargar Backup
                    </button>
                    <button id="btn-restore" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 px-4 rounded-lg shadow-lg transition duration-300">
                        Restaurar Backup
                    </button>
                </div>
                <button id="btn-close-app" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition duration-300 mt-4">
                    Cerrar Aplicación
                </button>
            </div>
        </div>

        <!-- ===== VISTA 2: FORMULARIO NUEVO CLIENTE ===== -->
        <div id="page-form" class="page space-y-4">
            <button class="btn-back text-blue-400 hover:text-blue-300">&larr; Volver</button>
            <h1 class="text-3xl font-bold text-center text-blue-400 mb-6">Nuevo Préstamo</h1>
            
            <form id="form-new-client" class="bg-gray-800 p-6 rounded-lg shadow-xl space-y-4">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-300 mb-1">Nombre del Cliente</label>
                    <input type="text" id="name" name="name" required class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label for="loanDate" class="block text-sm font-medium text-gray-300 mb-1">Fecha del Préstamo</label>
                    <input type="date" id="loanDate" name="loanDate" required class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label for="principal" class="block text-sm font-medium text-gray-300 mb-1">Monto Capital Prestado (B/.)</label>
                    <input type="number" id="principal" name="principal" step="0.01" min="1" required class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label for="interest" class="block text-sm font-medium text-gray-300 mb-1">Interés (%)</label>
                    <select id="interest" name="interest" required class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="10">10</option>
                        <option value="12">12</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                    </select>
                </div>

                <div>
                    <label for="period" class="block text-sm font-medium text-gray-300 mb-1">Periodicidad de Pago</label>
                    <select id="period" name="period" required class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="quincenal">Quincenal (15 y Fin de Mes)</option>
                        <option value="mensual">Mensual</option>
                    </select>
                    <!-- El texto de ayuda se insertará aquí dinámicamente -->
                    <p id="period-description" class="text-sm text-gray-400 mt-1"></p>
                </div>

                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition duration-300">
                    Guardar Cliente
                </button>
            </form>
        </div>

        <!-- ===== VISTA 3: ESTADO DE CUENTA (CLIENTE) ===== -->
        <div id="page-statement" class="page space-y-6">
            <button class="btn-back text-blue-400 hover:text-blue-300">&larr; Volver a la Lista</button>
            
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-3xl font-bold text-blue-400">Estado de Cuenta</h1>
                <button id="btn-share-whatsapp" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2">
